version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: myarchive_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootchangeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myarchive}
      MYSQL_USER: ${MYSQL_USER:-myarchive}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myarchive_network

networks:
  myarchive_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
